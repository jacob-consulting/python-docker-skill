# settings.yaml – shared defaults applied to every environment.
#
# These values are the safest possible baseline.  Each environment overlay
# (settings.development.yaml, settings.testing.yaml, settings.production.yaml)
# overrides only the keys that differ from these defaults.
#
# Secrets (SECRET_KEY in particular) must NOT live here; put them in
# .secrets.yaml (git-ignored) or pass them as DJANGO_* env vars.

# Disabled by default; the development overlay turns it on.
debug: false

# Placeholder – MUST be overridden by .secrets.yaml or DJANGO_SECRET_KEY env var.
# Using an obviously-wrong value makes it easy to spot misconfigured deployments.
secret_key: "django-insecure-change-me-in-production"

# Allow only loopback by default; each overlay extends this list.
allowed_hosts:
  - "localhost"
  - "127.0.0.1"

# Default database – SQLite for local/CI simplicity.
# Override the whole block in production to use PostgreSQL.
databases:
  default:
    ENGINE: "django.db.backends.sqlite3"
    NAME: "@format {this.BASE_DIR}/db.sqlite3"

# Email backend – console backend is safe for dev/test; override in production.
email_backend: "django.core.mail.backends.console.EmailBackend"

# Cache – local-memory cache is suitable for single-process dev/test.
# Override with Redis in production.
caches:
  default:
    BACKEND: "django.core.cache.backends.locmem.LocMemCache"
