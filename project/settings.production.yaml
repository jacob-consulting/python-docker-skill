# settings.production.yaml – overrides applied when ENV_FOR_DYNACONF=production
#
# SECRET_KEY must NOT be stored here.  Supply it via:
#   • .secrets.yaml (git-ignored, read at container start)
#   • DJANGO_SECRET_KEY environment variable (preferred for Docker / k8s)

debug: false

# Replace with your real domain(s).  Additional hosts can be injected at
# runtime via the DJANGO_ALLOWED_HOSTS environment variable.
allowed_hosts:
  - "your-domain.com"
  - "www.your-domain.com"

# ---------------------------------------------------------------------------
# Security headers – all disabled in dev/test but mandatory in production.
# ---------------------------------------------------------------------------

# Redirect all HTTP to HTTPS
secure_ssl_redirect: true

# HSTS: tell browsers to use HTTPS for 1 year (31536000 seconds)
secure_hsts_seconds: 31536000
secure_hsts_include_subdomains: true
secure_hsts_preload: true

# Prevent the session cookie from being sent over plain HTTP
session_cookie_secure: true

# Prevent the CSRF cookie from being sent over plain HTTP
csrf_cookie_secure: true

# Tell Django it's behind a TLS-terminating reverse proxy
secure_proxy_ssl_header:
  - "HTTP_X_FORWARDED_PROTO"
  - "https"

# ---------------------------------------------------------------------------
# Logging – structured JSON logging is preferable in production so logs can
# be ingested by log aggregators (Datadog, Loki, CloudWatch, etc.).
# ---------------------------------------------------------------------------

logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    json:
      # Requires python-json-logger; swap for "simple" if not installed.
      "()": "pythonjsonlogger.jsonlogger.JsonFormatter"
      format: "%(asctime)s %(name)s %(levelname)s %(message)s"
  handlers:
    console:
      class: "logging.StreamHandler"
      formatter: "json"
  root:
    handlers:
      - "console"
    level: "WARNING"
  loggers:
    django:
      handlers:
        - "console"
      level: "ERROR"
      propagate: false
